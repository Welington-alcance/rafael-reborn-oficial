<!DOCTYPE html>
<html>
<head>
  <title>Painel</title>
</head>

<body style="font-family:sans-serif; text-align:center; margin-top:50px;">

  <h1>📊 Seu Painel</h1>

  <p id="email"></p>
  <p id="numeros"></p>
  <p id="role"></p>

  <button onclick="logout()">Sair</button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      "https://tmjzflzvcmjspwjxgmxk.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtanpmbHp2Y21qc3B3anhnbXhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMDcwMDYsImV4cCI6MjA5MDc4MzAwNn0.sAkq1lPi8JoYbadAA5pDJQYsz8FVWM3BLfcpBckvoTo"
    );

    const ADMIN_EMAIL = "wferreira765@gmail.com";

    async function loadUser() {
      const { data } = await supabaseClient.auth.getUser();

      if (!data.user) {
        window.location.href = "/";
        return;
      }

      const user = data.user;

      document.getElementById("email").innerText =
        "Email: " + user.email;

      // 🔍 BUSCAR USUÁRIO
      let { data: existingUser, error } = await supabaseClient
        .from("users")
        .select("*")
        .eq("id", user.id);

      console.log("USER DB:", existingUser);

      // 🧱 SE NÃO EXISTIR → CRIA
      if (!existingUser || existingUser.length === 0) {
        await supabaseClient.from("users").insert({
          id: user.id,
          email: user.email,
          numeros: 0,
          role: user.email === ADMIN_EMAIL ? "admin" : "user"
        });

        let { data: newUser } = await supabaseClient
          .from("users")
          .select("*")
          .eq("id", user.id);

        existingUser = newUser;
      }

      const userData = existingUser[0] || {};

      // 🔥 GARANTE QUE SEMPRE TEM VALOR
      const numeros = userData.numeros ?? 0;
      const role = userData.role ?? "user";

      document.getElementById("numeros").innerText =
        "Números da sorte: " + numeros;

      document.getElementById("role").innerText =
        "Tipo: " + role;
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.href = "/";
    }

    loadUser();
  </script>

</body>
</html>
