<!DOCTYPE html>
<html>
<head>
  <title>Painel</title>
</head>

<body style="font-family:sans-serif; text-align:center; margin-top:50px;">

  <h1>📊 Seu Painel</h1>

  <p id="email"></p>
  <p id="numeros"></p>

  <input type="file" id="fileInput">
  <button onclick="upload()">Enviar Print</button>

  <p id="status"></p>

  <button onclick="logout()">Sair</button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      "https://tmjzflzvcmjspwjxgmxk.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtanpmbHp2Y21qc3B3anhnbXhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMDcwMDYsImV4cCI6MjA5MDc4MzAwNn0.sAkq1lPi8JoYbadAA5pDJQYsz8FVWM3BLfcpBckvoTo"
    );

    let currentUser;

    async function loadUser() {
      const { data } = await supabaseClient.auth.getUser();

      if (!data.user) {
        window.location.href = "/";
        return;
      }

      currentUser = data.user;

      document.getElementById("email").innerText =
        "Email: " + currentUser.email;

      let { data: userData } = await supabaseClient
        .from("users")
        .select("*")
        .eq("id", currentUser.id);

      document.getElementById("numeros").innerText =
        "Números da sorte: " + (userData[0]?.numeros ?? 0);
    }

    async function upload() {
      const file = document.getElementById("fileInput").files[0];

      if (!file) {
        alert("Escolha um arquivo");
        return;
      }

      const fileName = Date.now() + "-" + file.name;

      const { data, error } = await supabaseClient.storage
        .from("prints")
        .upload(fileName, file);

      if (error) {
        document.getElementById("status").innerText = "Erro no upload";
        return;
      }

      const imageUrl =
        "https://tmjzflzvcmsjpwixgmxk.supabase.co/storage/v1/object/public/prints/" + fileName;

      await supabaseClient.from("prints").insert({
        user_id: currentUser.id,
        image_url: imageUrl
      });

      document.getElementById("status").innerText =
        "Print enviado com sucesso!";
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.href = "/";
    }

    loadUser();
  </script>

</body>
</html>
