<!DOCTYPE html>
<html>
<head>
  <title>Painel</title>
</head>

<body style="font-family:sans-serif; text-align:center; margin-top:50px;">

  <h1>📊 Seu Painel</h1>

  <p id="email"></p>
  <p id="numeros"></p>
  <p id="tipo"></p>

  <br>

  <input type="file" id="fileInput">
  <button onclick="upload()">Enviar Print</button>

  <p id="status"></p>

  <br><br>

  <button onclick="logout()">Sair</button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      "https://tmjzflzvcmjspwjxgmxk.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtanpmbHp2Y21qc3B3anhnbXhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMDcwMDYsImV4cCI6MjA5MDc4MzAwNn0.sAkq1lPi8JoYbadAA5pDJQYsz8FVWM3BLfcpBckvoTo"
    );

    let currentUser;

    // 🔐 carregar usuário
    async function loadUser() {
      const { data } = await supabaseClient.auth.getUser();

      if (!data.user) {
        window.location.href = "/";
        return;
      }

      currentUser = data.user;

      document.getElementById("email").innerText =
        "Email: " + currentUser.email;

      const { data: userData } = await supabaseClient
        .from("users")
        .select("*")
        .eq("id", currentUser.id);

      const user = userData[0];

      document.getElementById("numeros").innerText =
        "Números da sorte: " + (user?.numeros ?? 0);

      document.getElementById("tipo").innerText =
        "Tipo: " + (user?.role ?? "user");
    }

    // 📸 upload de print
    async function upload() {
      const file = document.getElementById("fileInput").files[0];

      if (!file) {
        alert("Escolha um arquivo");
        return;
      }

      const fileName = Date.now() + "-" + file.name;

      // upload no storage
      const { error } = await supabaseClient.storage
        .from("prints")
        .upload(fileName, file);

      if (error) {
        document.getElementById("status").innerText = "Erro no upload";
        console.log(error);
        return;
      }

      // 🔥 pega URL correta
      const { data: publicUrl } = supabaseClient
        .storage
        .from("prints")
        .getPublicUrl(fileName);

      const imageUrl = publicUrl.publicUrl;

      // salva no banco
      await supabaseClient.from("prints").insert({
        user_id: currentUser.id,
        image_url: imageUrl,
        status: "pendente"
      });

      document.getElementById("status").innerText =
        "Print enviado com sucesso!";

      // limpa input
      document.getElementById("fileInput").value = "";
    }

    // 🚪 logout
    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.href = "/";
    }

    loadUser();
  </script>

</body>
</html>
