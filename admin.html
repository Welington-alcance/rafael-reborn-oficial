<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin</title>
</head>
<body>

  <h1>🧑‍💻 Painel Admin</h1>
  <p id="user-info"></p>

  <div id="prints"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabase = window.supabase.createClient(
      "https://tmjzflzvcmjspwjxgmxk.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtanpmbHp2Y21qc3B3anhnbXhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMDcwMDYsImV4cCI6MjA5MDc4MzAwNn0.sAkq1lPi8JoYbadAA5pDJQYsz8FVWM3BLfcpBckvoTo"
    );

    async function iniciar() {
      const { data: { user } } = await supabase.auth.getUser();

      if (!user) {
        alert("Faça login primeiro");
        window.location.href = "/";
        return;
      }

      document.getElementById("user-info").innerText =
        "Logado como: " + user.email;

      // 🔥 BUSCAR USUÁRIO NO BANCO
      const { data: usuario } = await supabase
        .from("users")
        .select("*")
        .eq("id", user.id)
        .single();

      // 🔒 BLOQUEAR SE NÃO FOR ADMIN
      if (usuario.role !== "admin") {
        alert("Acesso negado");
        window.location.href = "/dashboard.html";
        return;
      }

      carregarPrints();
    }

    async function carregarPrints() {
      const container = document.getElementById("prints");
      container.innerHTML = "";

      // ✅ MOSTRAR SÓ PENDENTES
      const { data: prints } = await supabase
        .from("prints")
        .select("*")
        .eq("status", "pendente");

      for (let print of prints) {
        const div = document.createElement("div");
        div.style.border = "1px solid #ccc";
        div.style.margin = "20px";
        div.style.padding = "20px";

        div.innerHTML = `
          <img src="${print.image_url}" width="200"><br><br>
          Status: ${print.status}<br><br>
          <button onclick="aprovar('${print.id}', '${print.user_id}')">
            Aprovar
          </button>
        `;

        container.appendChild(div);
      }
    }

    async function aprovar(printId, userId) {
      // 🔄 Atualiza status do print
      await supabase
        .from("prints")
        .update({ status: "aprovado" })
        .eq("id", printId);

      // 🔢 Buscar números atuais
      const { data: userData } = await supabase
        .from("users")
        .select("numeros")
        .eq("id", userId)
        .single();

      const novosNumeros = (userData.numeros || 0) + 1;

      // 🔢 Atualiza números da sorte
      await supabase
        .from("users")
        .update({ numeros: novosNumeros })
        .eq("id", userId);

      alert("Print aprovado + número gerado!");

      carregarPrints();
    }

    iniciar();
  </script>

</body>
</html>
